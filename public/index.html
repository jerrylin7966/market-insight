<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asset Hub</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-zoom/2.0.1/chartjs-plugin-zoom.min.js"></script>
<script src="https://s3.tradingview.com/tv.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0f0e;--bg2:#141714;--bg3:#1b1e1b;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--text:#e8ebe6;--muted:#7a8278;--accent:#4eca8b;--red:#e05c5c;--mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans)}
#auth-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100}
#auth-overlay.hidden{display:none}
.auth-box{background:var(--bg2);border:0.5px solid var(--border2);border-radius:16px;padding:2.5rem;width:320px}
.auth-box h1{font-size:20px;font-weight:500;margin-bottom:8px}
.auth-box p{font-size:13px;color:var(--muted);margin-bottom:1.5rem}
.auth-box input{width:100%;background:var(--bg3);border:0.5px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:14px;padding:10px 12px;outline:none;margin-bottom:12px}
.auth-box input:focus{border-color:var(--accent)}
.auth-box button{width:100%;background:var(--accent);color:#0d0f0e;border:none;border-radius:8px;font-size:14px;font-weight:500;padding:11px;cursor:pointer}
#app{opacity:0;transition:opacity 0.3s}
#app.ready{opacity:1}
header{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 2rem;border-bottom:0.5px solid var(--border)}
.logo{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--accent);letter-spacing:0.08em}
.header-right{display:flex;align-items:center;gap:10px}
.last-updated{font-size:12px;color:var(--muted);font-family:var(--mono)}
.btn-refresh{background:var(--bg3);border:0.5px solid var(--border2);color:var(--text);border-radius:8px;font-size:12px;padding:7px 14px;cursor:pointer;font-family:var(--sans)}
.btn-refresh:hover{border-color:var(--accent);color:var(--accent)}
.btn-refresh:disabled{opacity:0.4;cursor:default}
.btn-nav{background:var(--bg3);border:0.5px solid var(--border2);color:var(--muted);border-radius:8px;font-size:12px;padding:7px 14px;cursor:pointer;font-family:var(--sans);transition:all 0.15s}
.btn-nav:hover,.btn-nav.active{border-color:var(--accent);color:var(--accent)}
main{padding:2rem;max-width:1280px;margin:0 auto}
.net-worth-section{margin-bottom:2.5rem}
.net-worth-label{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.net-worth-value{font-family:var(--mono);font-size:52px;font-weight:300;color:var(--text);line-height:1}
.net-worth-value .currency{font-size:0.5em;color:var(--muted);margin-right:6px}
.chart-section{background:var(--bg2);border:0.5px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:2rem}
.chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.chart-title{font-size:12px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted)}
.chart-range{display:flex;gap:4px}
.range-btn{background:none;border:0.5px solid transparent;color:var(--muted);border-radius:6px;font-size:11px;padding:4px 8px;cursor:pointer;font-family:var(--mono)}
.range-btn.active,.range-btn:hover{border-color:var(--border2);color:var(--text)}
.chart-container{position:relative;height:180px}
.group-label{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:0.75rem;margin-top:1.75rem}
.platform-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:0.5rem}
.platform-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:14px;padding:1.25rem;transition:border-color 0.2s}
.platform-card:hover{border-color:var(--border2)}
.platform-card.has-error{border-color:rgba(224,92,92,0.25)}
.platform-card.manual-platform{border-style:dashed}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1rem}
.card-name{font-size:13px;font-weight:500}
.card-meta{font-size:11px;color:var(--muted);margin-top:2px}
.card-method{font-size:10px;font-family:var(--mono);padding:3px 7px;border-radius:4px;border:0.5px solid var(--border);color:var(--muted)}
.card-method.connected{color:var(--accent);border-color:rgba(78,202,139,0.25)}
.card-method.disconnected{color:var(--red);border-color:rgba(224,92,92,0.25)}
.card-balance{font-family:var(--mono);font-size:22px;font-weight:300;line-height:1}
.card-balance .sym{font-size:14px;color:var(--muted);margin-right:3px}
.card-native{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:5px}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
.card-date{font-size:10px;color:var(--muted);font-family:var(--mono)}
.card-error{font-size:11px;color:var(--red);margin-top:8px;line-height:1.5}
.card-connect{font-size:11px;color:#5b9fe8;text-decoration:none}
.manual-form{margin-top:12px;padding-top:12px;border-top:0.5px solid var(--border)}
.manual-form label{font-size:11px;color:var(--muted);display:block;margin-bottom:6px}
.manual-form-row{display:flex;gap:8px;align-items:center}
.manual-input{flex:1;background:var(--bg3);border:0.5px solid var(--border2);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:13px;padding:7px 10px;outline:none}
.manual-input:focus{border-color:var(--accent)}
.manual-save{background:none;border:0.5px solid var(--border2);color:var(--text);border-radius:6px;font-size:12px;padding:7px 12px;cursor:pointer;white-space:nowrap}
.manual-save:hover{border-color:var(--accent);color:var(--accent)}
#auth-error{color:var(--red);font-size:12px;margin-top:8px;display:none}
/* Market Timing Page */
.mkt-section{background:var(--bg2);border:0.5px solid var(--border);border-radius:14px;padding:1.5rem;margin-bottom:1.25rem}
.mkt-label{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.mkt-desc{font-size:13px;color:var(--text);margin-bottom:1rem}
.mkt-note{font-size:11px;color:var(--muted);margin-top:10px;line-height:1.7;font-family:var(--mono)}
.tv-wrap{border-radius:8px;overflow:hidden}
.signal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.signal-heading{font-family:var(--mono);font-size:18px;font-weight:300;color:var(--text)}
.signal-badge{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:0.07em;padding:6px 16px;border-radius:6px;border:0.5px solid}
.sig-green{color:#4eca8b;border-color:rgba(78,202,139,0.35);background:rgba(78,202,139,0.08)}
.sig-yellow{color:#e8a838;border-color:rgba(232,168,56,0.35);background:rgba(232,168,56,0.08)}
.sig-red{color:#e05c5c;border-color:rgba(224,92,92,0.35);background:rgba(224,92,92,0.08)}
.sig-grey{color:var(--muted);border-color:rgba(122,130,120,0.35);background:rgba(122,130,120,0.08)}
.index-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:0.5rem}
.index-card{background:var(--bg3);border:0.5px solid var(--border);border-radius:10px;padding:1rem}
.index-card-name{font-size:12px;font-weight:500;margin-bottom:10px;color:var(--text)}
.status-table{width:100%;border-collapse:collapse;margin-top:1rem}
.status-table td{font-size:12px;font-family:var(--mono);padding:9px 12px;border-bottom:0.5px solid var(--border);color:var(--muted);vertical-align:middle}
.status-table tr:last-child td{border-bottom:none}
.status-table td:first-child{color:var(--text)}
.status-table td:nth-child(2){color:var(--text)}
.traffic-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:0.75rem 0}
.traffic-card{background:var(--bg3);border:0.5px solid var(--border);border-radius:10px;padding:1.25rem;text-align:center;transition:all 0.3s}
.traffic-label{font-size:12px;font-weight:500;color:var(--text);margin-bottom:8px;letter-spacing:0.04em}
.traffic-pct{font-family:var(--mono);font-size:26px;font-weight:300;margin-bottom:4px}
.traffic-sub{font-size:10px;color:var(--muted)}
.traffic-green{border-color:#4eca8b!important;background:rgba(78,202,139,0.08)!important}
.traffic-green .traffic-pct{color:#4eca8b}
.traffic-amber{border-color:#e8a84a!important;background:rgba(232,168,74,0.08)!important}
.traffic-amber .traffic-pct{color:#e8a84a}
.traffic-red{border-color:#e05c5c!important;background:rgba(224,92,92,0.08)!important}
.traffic-red .traffic-pct{color:#e05c5c}
.divergence-box{padding:10px 14px;border-radius:8px;font-size:12px;font-family:var(--mono);margin-top:8px;line-height:1.5}
.divergence-alert{background:rgba(224,92,92,0.08);border:0.5px solid rgba(224,92,92,0.35);color:#e05c5c}
.divergence-amber{background:rgba(232,168,74,0.08);border:0.5px solid rgba(232,168,74,0.35);color:#e8a84a}
.divergence-green{background:rgba(78,202,139,0.08);border:0.5px solid rgba(78,202,139,0.35);color:#4eca8b}
.divergence-ok{background:rgba(255,255,255,0.02);border:0.5px solid var(--border);color:var(--muted)}
</style>
</head>
<body>
<div id="auth-overlay">
  <div class="auth-box">
    <h1>Asset Hub</h1>
    <p>Enter your dashboard password to continue.</p>
    <input type="password" id="password-input" placeholder="Password">
    <button onclick="login()">Unlock</button>
    <p id="auth-error">Incorrect password</p>
  </div>
</div>
<div id="app">
  <header>
    <div class="logo">ASSET HUB</div>
    <div class="header-right">
      <span class="last-updated" id="last-updated">—</span>
      <button class="btn-nav" id="btn-market" onclick="window.location.href='/market-timing.html'" data-i18n="nav-market">Market Timing</button>
      <button class="btn-refresh" onclick="triggerFetch()" id="btn-refresh" data-i18n="btn-refresh">Run now</button>
      <button class="btn-nav" onclick="triggerWeeklyEmail()" id="btn-send-email" data-i18n="btn-send-email">Send report</button>
      <button class="btn-nav" id="lang-btn" onclick="toggleLang()">繁中</button>
    </div>
  </header>
  <main>
    <div id="page-assets">
      <div class="net-worth-section">
        <div class="net-worth-label" data-i18n="total-label">Total net worth</div>
        <div class="net-worth-value"><span class="currency">USD</span><span id="total-num">—</span></div>
      </div>
      <div class="chart-section">
        <div class="chart-header">
          <div class="chart-title" data-i18n="history-title">Net worth history</div>
          <div class="chart-range">
            <button class="range-btn active" onclick="setRange(30,this)">30d</button>
            <button class="range-btn" onclick="setRange(60,this)">60d</button>
            <button class="range-btn" onclick="setRange(90,this)">90d</button>
          </div>
        </div>
        <div class="chart-container"><canvas id="history-chart"></canvas></div>
      </div>
      <div class="group-label" data-i18n="group-bank">Banks</div>
      <div class="platform-grid" id="group-bank"></div>
      <div class="group-label" data-i18n="group-broker">Brokers</div>
      <div class="platform-grid" id="group-broker"></div>
      <div class="group-label" data-i18n="group-crypto">Crypto</div>
      <div class="platform-grid" id="group-crypto"></div>
      <div class="group-label" data-i18n="group-manual">Manual</div>
      <div id="group-manual"></div>
      <div class="group-label" data-i18n="group-rsu">RSU</div>
      <div class="platform-grid" id="group-rsu"></div>
    </div>

  </main>
</div>
<script>
// ── i18n ──────────────────────────────────────────────────────────────────
const translations={
  en:{
    'nav-market':'Market Timing',
    'btn-refresh':'Run now',
    'total-label':'Total net worth',
    'history-title':'Net worth history',
    'group-bank':'Banks',
    'group-broker':'Brokers',
    'group-crypto':'Crypto',
    'group-manual':'Manual',
    'group-rsu':'RSU',
    'update-balance':'Update balance',
    'save':'Save',
    'no-data':'No data yet',
    'connection-issue':'Connection issue',
    'btn-send-email':'Send report',
  },
  zh:{
    'nav-market':'市場時機',
    'btn-refresh':'立即更新',
    'total-label':'總資產淨值',
    'history-title':'資產歷史走勢',
    'group-bank':'銀行',
    'group-broker':'券商',
    'group-crypto':'加密貨幣',
    'group-manual':'手動輸入',
    'group-rsu':'RSU 股票',
    'update-balance':'更新餘額',
    'save':'儲存',
    'no-data':'尚無資料',
    'connection-issue':'連線問題',
    'page-title':'市場時機',
    'score-label':'評分',
    'early-warning':'早期預警（SOX / QQQ 比率）',
    'vix-section':'VIX 期限結構',
    'index-health':'指數健康度',
    'breadth':'市場廣度',
    'claims':'初次申請失業救濟人數',
    'btn-send-email':'發送報告',
    'phase1-action':'持有多倉，積極逢低買入',
    'phase2-action':'降低風險，收緊止損，不開新倉',
    'phase3-action':'退出成長倉位，轉移至現金',
    'bullish':'看漲',
    'bearish':'看跌',
    'slope-sharp-up':'↑ 急速上升',
    'slope-divergent-down':'↘ 背離下行',
    'slope-sharp-down':'↓ 急速下跌',
    'slope-neutral':'→ 中性',
    'phase-early-bull':'牛市初/中期',
    'phase-late-bull':'牛市末期',
    'phase-early-bear':'熊市初期',
    'phase-transition':'過渡期',
    'insight-buy':'積極逢低買入 — 半導體正領漲',
    'insight-sell':'最佳出貨視窗 — 標普500高峰預計3–9個月後',
    'insight-exit':'退出所有成長倉位 — 週期領先地位崩潰',
    'insight-monitor':'觀察方向確認訊號',
    'phase-label':'階段：',
    'vix-complacency':'極度自滿',
    'vix-panic':'恐慌/機會',
    'vix-neutral':'中性',
    'tl-hold':'持倉',
    'tl-watch':'觀察',
    'tl-reduce':'減倉',
    'div-sell-window':'⚠ 出貨視窗啟動 — SOX見紅但標普見綠。最佳派貨階段，預計標普3–9個月後見頂。',
    'div-watch':'👀 注意 — SOX落後標普。繼續監察惡化跡象。',
    'div-broad-strength':'✅ 全面強勢 — 所有指數距高點5%以內。牛市完好。',
    'div-broad-weakness':'🔴 全面弱勢 — 全面回調。風險規避模式。',
    'div-mixed':'↔ 訊號混合 — 未有明確背離形態。',
    'bd-bullish':'看漲',
    'bd-bearish':'看跌',
    'bd-strong':'強勢',
    'bd-weak':'弱勢',
    'bd-divergent':'⚠ 是',
    'bd-not-divergent':'✓ 否',
    'claims-improving':'↓ 申請人數減少 — 宏觀底部支撐',
    'claims-worsening':'↑ 申請人數上升 — 宏觀風險',
    'score-scored':'✓ +1',
    'score-not-scored':'○ +0',
  },
};

function applyTranslations(lang){
  const tr=translations[lang]||translations.en;
  document.documentElement.lang=lang==='zh'?'zh-TW':'en';
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const key=el.getAttribute('data-i18n');
    if(tr[key])el.textContent=tr[key];
  });
  const btn=document.getElementById('lang-btn');
  if(btn)btn.textContent=lang==='zh'?'EN':'繁中';
}

function toggleLang(){
  currentLang=currentLang==='en'?'zh':'en';
  localStorage.setItem('lang',currentLang);
  applyTranslations(currentLang);
}

// ─────────────────────────────────────────────────────────────────────────

let currentLang=localStorage.getItem('lang')||'en';
function t(key){return(translations[currentLang]||translations.en)[key]||key;}

let password='';
let chart=null;

function login(){
  password=document.getElementById('password-input').value;
  sessionStorage.setItem('hub_pw',password);
  loadData();
}
document.getElementById('password-input').addEventListener('keydown',e=>{if(e.key==='Enter')login();});

function authHeader(){return{'Authorization':'Basic '+btoa(':'+password)};}

async function loadData(){
  try{
    const[summaryRes,historyRes]=await Promise.all([
      fetch('/api/summary',{headers:authHeader()}),
      fetch('/api/history?days=30',{headers:authHeader()}),
    ]);
    if(summaryRes.status===401){document.getElementById('auth-error').style.display='block';return;}
    document.getElementById('auth-overlay').classList.add('hidden');
    document.getElementById('app').classList.add('ready');
    document.getElementById('auth-error').style.display='none';
    const summary=await summaryRes.json();
    const history=await historyRes.json();
    renderSummary(summary);
    renderChart(history);
  }catch(err){console.error('Load failed:',err);}
}

function renderSummary(data){
  document.getElementById('total-num').textContent=Math.round(data.totalUsd).toLocaleString('en-US');
  document.getElementById('last-updated').textContent='as of '+new Date(data.asOf).toLocaleTimeString();
  ['bank','broker','crypto','rsu'].forEach(g=>document.getElementById('group-'+g).innerHTML='');
  document.getElementById('group-manual').innerHTML='';
  const manualById={};
  for(const p of data.platforms){
    if(p.category==='manual'){
      manualById[p.id]=p;
    }else{
      const group=document.getElementById('group-'+p.category);
      if(group)group.appendChild(buildCard(p));
    }
  }
  const manualSubGroups=[
    {label:'Binance',ids:['binance']},
    {label:'Coinbase',ids:['coinbase']},
    {label:'Phantom',ids:['phantom']},
    {label:'Revolut',ids:['revolut_balance','revolut_stocks','revolut_crypto']},
    {label:'Tiger Trade',ids:['tiger']},
    {label:'China Bank',ids:['china_bank']},
    {label:'CTBC Bank',ids:['ctbc_balance','ctbc_stocks']},
    {label:'DBS',ids:['dbs']},
  ];
  const mc=document.getElementById('group-manual');
  for(const sg of manualSubGroups){
    const platforms=sg.ids.map(id=>manualById[id]).filter(Boolean);
    if(!platforms.length)continue;
    const lbl=document.createElement('div');
    lbl.className='group-label';lbl.textContent=sg.label;
    mc.appendChild(lbl);
    const grid=document.createElement('div');
    grid.className='platform-grid';
    for(const p of platforms)grid.appendChild(buildCard(p));
    mc.appendChild(grid);
  }
}

function buildCard(p){
  const div=document.createElement('div');
  div.className='platform-card'+(p.hasError?' has-error':'')+((p.category==='manual'||p.category==='rsu')?' manual-platform':'');
  const isConnected=!p.hasError&&p.balanceUsd!==null;
  const methodLabel={[`api-key`]:'API','oauth':'OAuth','public-rpc':'RPC','manual':'Manual'}[p.method??'manual']??'—';
  let balHtml=p.balanceUsd!==null
    ?`<div class="card-balance"><span class="sym">$</span>${Math.round(p.balanceUsd).toLocaleString('en-US')}</div>${p.currency!=='USD'?`<div class="card-native">${p.currency} ${Math.round(p.balanceNative).toLocaleString('en-US')}</div>`:''}`
    :`<div class="card-balance" style="font-size:14px;color:var(--muted)">No data yet</div>`;
  let errHtml='';
  if(p.hasError){
    errHtml=`<div class="card-error">Connection issue</div>`;
    if(p.connectUrl)errHtml+=`<a class="card-connect" href="${p.connectUrl}">Connect now →</a>`;
  }
  let manualHtml='';
  if(p.category==='manual'||p.category==='rsu'){
    manualHtml=`<div class="manual-form"><label>Update balance (${p.currency})</label><div class="manual-form-row"><input class="manual-input" type="number" id="manual-${p.id}" data-currency="${p.currency}" placeholder="e.g. 150000"><button class="manual-save" onclick="saveManual('${p.id}')">Save</button></div></div>`;
  }
  div.innerHTML=`
    <div class="card-top">
      <div><div class="card-name">${p.flag} ${p.name}</div><div class="card-meta">${p.currency} · ${p.category}</div></div>
      <div class="card-method ${isConnected?'connected':'disconnected'}">${methodLabel}</div>
    </div>
    ${balHtml}${errHtml}
    <div class="card-footer"><div class="card-date">${p.lastUpdated??'—'}</div></div>
    ${manualHtml}`;
  return div;
}

function renderChart(history){
  const ctx=document.getElementById('history-chart').getContext('2d');
  if(chart)chart.destroy();
  if(!history||history.length===0){
    ctx.fillStyle='#7a8278';ctx.font='13px DM Sans';ctx.textAlign='center';
    ctx.fillText('No history yet — click Run now to fetch your first snapshot.',ctx.canvas.width/2,90);
    return;
  }
  chart=new Chart(ctx,{
    type:'line',
    data:{labels:history.map(h=>h.date),datasets:[{data:history.map(h=>h.total_usd),borderColor:'#4eca8b',borderWidth:1.5,pointRadius:0,pointHoverRadius:4,fill:true,backgroundColor:'rgba(78,202,139,0.06)',tension:0.4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'#1b1e1b',borderColor:'rgba(255,255,255,0.1)',borderWidth:0.5,titleColor:'#7a8278',bodyColor:'#e8ebe6',bodyFont:{family:'DM Mono',size:13},callbacks:{label:c=>'  $'+Math.round(c.parsed.y).toLocaleString()}}},
    scales:{x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#7a8278',font:{family:'DM Mono',size:10},maxTicksLimit:6},border:{display:false}},y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#7a8278',font:{family:'DM Mono',size:10},callback:v=>'$'+Math.round(Number(v)/1000)+'k'},border:{display:false}}}}
  });
}


async function setRange(days,btn){
  btn.closest('.chart-range').querySelectorAll('.range-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const res=await fetch(`/api/history?days=${days}`,{headers:authHeader()});
  renderChart(await res.json());
}

async function triggerFetch(){
  const btn=document.getElementById('btn-refresh');
  btn.textContent='Running...';btn.disabled=true;
  try{
    const res=await fetch('/api/fetch-now',{method:'POST',headers:authHeader()});
    if((await res.json()).ok)await loadData();
  }finally{btn.textContent=t('btn-refresh');btn.disabled=false;}
}

async function triggerWeeklyEmail(){
  const btn=document.getElementById('btn-send-email');
  const orig=btn.textContent;
  btn.textContent='Sending...';btn.disabled=true;
  try{
    const res=await fetch('/api/send-weekly-email',{method:'POST',headers:authHeader()});
    const data=await res.json();
    btn.textContent=data.ok?'✓ Sent':'✗ Failed';
    setTimeout(()=>{btn.textContent=t('btn-send-email');},3000);
  }catch{
    btn.textContent='✗ Error';
    setTimeout(()=>{btn.textContent=t('btn-send-email');},3000);
  }finally{btn.disabled=false;}
}

async function saveManual(id) {
  const input = document.getElementById('manual-' + id);
  if (!input) { console.error('Input not found for', id); return; }
  const value = parseFloat(input.value);
  console.log('saveManual called:', id, 'value:', value, 'raw:', input.value);
  if (isNaN(value) || value < 0) { alert('Please enter a valid amount'); return; }
  try {
    const res = await fetch('/api/manual', {
      method: 'POST',
      headers: { ...authHeader(), 'Content-Type': 'application/json' },
      body: JSON.stringify({ platform: id, balanceNative: value }),
    });
    const data = await res.json();
    console.log('Save response:', data);
    if (data.ok) {
      input.value = '';
      input.placeholder = 'Saved: ' + value.toLocaleString();
      await fetch('/api/fetch-now', { method: 'POST', headers: authHeader() });
      await loadData();
    } else {
      alert('Save failed: ' + JSON.stringify(data));
    }
  } catch (err) {
    console.error('Save error:', err);
    alert('Error: ' + err.message);
  }
}
