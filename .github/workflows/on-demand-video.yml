name: On-Demand Topic Video

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Topic for Claude to write (e.g. "Trump tariffs"). Leave blank if using script_file.'
        required: false
        type: string
        default: ''
      script_file:
        description: 'File path (e.g. scripts/custom_narration.txt) OR paste your full script here directly. Takes priority over topic.'
        required: false
        type: string
        default: ''
      shorts_only:
        description: 'Set to "true" to produce a Short only (no long video). Leave blank for full long video + Short.'
        required: false
        type: string
        default: ''

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg imagemagick fonts-liberation

      - name: Install Python dependencies
        run: pip install Pillow numpy requests

      - name: Run on-demand video generator
        env:
          TOPIC: ${{ github.event.inputs.topic }}
          SCRIPT_FILE: ${{ github.event.inputs.script_file }}
          SHORTS_ONLY: ${{ github.event.inputs.shorts_only }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python scripts/generate_daily_video.py
