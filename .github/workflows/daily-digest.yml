name: Daily Market Digest

on:
  schedule:
    # 10:30 UTC = 6:30am ET (weekdays only)
    - cron: '30 10 * * 1-5'
  workflow_dispatch:   # allow manual trigger from GitHub UI

permissions:
  contents: write      # needed to auto-commit the generated HTML

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run digest generator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_daily_digest.py

      - name: Commit and push digest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add finance-hub/daily/
          # Only commit if there are actual changes
          git diff --cached --quiet || git commit -m "chore: daily market digest $(date +%Y-%m-%d)"
          git push
