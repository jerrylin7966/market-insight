name: Daily Market Digest

on:
  schedule:
    # 10:30 UTC = 6:30am ET (weekdays only)
    - cron: '30 10 * * 1-5'
  workflow_dispatch:   # allow manual trigger from GitHub UI

permissions:
  contents: write      # needed to auto-commit the generated HTML

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run digest generator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_daily_digest.py

      - name: Install ffmpeg (static build, no apt dependencies)
        run: |
          wget -q https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz
          tar -xf ffmpeg-master-latest-linux64-gpl.tar.xz
          sudo mv ffmpeg-master-latest-linux64-gpl/bin/ffmpeg /usr/local/bin/
          sudo mv ffmpeg-master-latest-linux64-gpl/bin/ffprobe /usr/local/bin/
          ffmpeg -version | head -1

      - name: Install Python deps
        run: pip install numpy Pillow --break-system-packages -q

      - name: Download clip library (single frame per clip for Shorts)
        run: |
          mkdir -p scripts/assets/clips
          BASE="https://github.com/jerrylin7966/market-insight/releases/download/clips-v1"
          # Download only a few key clips used most often in Shorts backgrounds
          for clip in stock_bull stock_crash federal_reserve wall_street inflation \
            tech_stocks earnings nyse_open data_screens global_economy; do
            wget -q "$BASE/${clip}.mp4" -O "scripts/assets/clips/${clip}.mp4" || \
              echo "Warning: could not download ${clip}.mp4, will use image fallback"
          done
          echo "Clips downloaded: $(ls scripts/assets/clips/*.mp4 2>/dev/null | wc -l)"

      - name: Run video generator (Shorts only)
        env:
          SHORTS_ONLY: "true"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python scripts/generate_daily_video.py

      - name: Commit and push digest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add finance-hub/daily/
          # Only commit if there are actual changes
          git diff --cached --quiet || git commit -m "chore: daily market digest + FRED data $(date +%Y-%m-%d)"
          git pull --rebase origin main
          git push
